name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: nhartland/love-build@v1
        id: love-build
        with:
          app_name: bait-and-switch
          love_version: "11.5"

      - uses: softprops/action-gh-release@v2
        with:
          name: Bait and Switch ${{ github.ref_name }}
          files: |
            ${{ steps.love-build.outputs.win32-filename }}
            ${{ steps.love-build.outputs.win64-filename }}
            ${{ steps.love-build.outputs.macos-filename }}
            ${{ steps.love-build.outputs.linux_x86_64-filename }}
            ${{ steps.love-build.outputs.love-filename }}

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create .love file
        run: |
          mkdir -p /tmp/game
          cp -r main.lua conf.lua src assets /tmp/game/
          cd /tmp/game && zip -r /tmp/game.love . && cd -

      - name: Build web version
        run: npx love.js /tmp/game.love web-build -t "Bait and Switch"

      - name: Deploy to Vercel
        run: |
          npm i -g vercel@latest
          cd web-build
          vercel deploy --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --cwd .
